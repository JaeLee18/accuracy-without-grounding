name: validate

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile Python sources
        run: python -m compileall -q src analysis cluster
      - name: Install analysis dependencies
        run: python -m pip install numpy scipy pandas statsmodels matplotlib
      - name: Smoke-test bundled-result analyses
        run: |
          python analysis/recompute_full_table1.py
          python analysis/compute_acc_ci.py
          python src/mvbench/analyze_mvbench.py
